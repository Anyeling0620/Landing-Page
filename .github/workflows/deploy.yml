name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Update site directory
        run: |
          SITE_PATH="${{ vars.SITE_ROOT }}"
          sudo rm -rf $SITE_PATH/*
          sudo cp -r dist/* $SITE_PATH/
          sudo chown -R www:www $SITE_PATH/