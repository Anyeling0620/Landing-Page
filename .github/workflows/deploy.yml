name: Deploy to Cloud Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Setup server (firewall + nginx)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            # 开放防火墙端口 9090
            if command -v ufw &>/dev/null; then
              sudo ufw allow 9090/tcp
              sudo ufw reload 2>/dev/null || true
            elif command -v firewall-cmd &>/dev/null; then
              sudo firewall-cmd --permanent --add-port=9090/tcp
              sudo firewall-cmd --reload
            fi

            # 配置 Nginx 监听 9090 端口
            if command -v nginx &>/dev/null; then
              SITE_PATH="${{ vars.SITE_ROOT }}"
              CONF="/etc/nginx/sites-available/show1"

              echo '' | base64 -d | sudo tee "$CONF" > /dev/null
              sudo ln -sf "$CONF" /etc/nginx/sites-enabled/show1
              sudo sed -i "s|root .*;|root $SITE_PATH;|" "$CONF"
              sudo nginx -t && sudo systemctl reload nginx || true
            fi

      - name: Deploy build to cloud server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          source: "dist/*"
          target: ${{ vars.SITE_ROOT }}
          strip_components: 1
          rm: true

      - name: Reload web server after deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            echo "Deployment complete to ${{ vars.SITE_ROOT }}"
            sudo chown -R www:www ${{ vars.SITE_ROOT }} 2>/dev/null || true
            sudo nginx -s reload 2>/dev/null || sudo systemctl reload nginx 2>/dev/null || true
            echo "Site reloaded on port 9090"

